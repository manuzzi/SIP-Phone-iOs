name: HomeSIP

options:
  bundleIdPrefix: work.manuzzi
  deploymentTarget:
    iOS: "15.0"

packages:
  LinphoneSDK:
    # Mirror GitHub del repo ufficiale (gitlab.linphone.org non raggiungibile da questa rete
    # al momento della creazione del progetto: vedi nota in PIANO_SVILUPPO.md).
    url: https://github.com/BelledonneCommunications/linphone-sdk-swift-ios.git
    branch: stable

targets:
  HomeSIP:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: HomeSIP
        excludes:
          - "Resources/**"
      - path: HomeSIP/Resources
    info:
      path: HomeSIP/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIBackgroundModes:
          - audio
          - voip
        NSMicrophoneUsageDescription: "HomeSIP usa il microfono per le chiamate SIP."
        NSLocalNetworkUsageDescription: "HomeSIP si collega al centralino Asterisk sulla rete locale di casa."
        NSSiriUsageDescription: "HomeSIP usa Siri per avviare chiamate SIP su comando vocale."
    entitlements:
      path: HomeSIP/HomeSIP.entitlements
      properties:
        aps-environment: development
        com.apple.developer.siri: true
        com.apple.security.application-groups:
          - group.work.manuzzi.homesip
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: work.manuzzi.homesip
        PRODUCT_NAME: HomeSIP
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: WQZGRLXS8K
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: LinphoneSDK
        product: linphonesw
      - target: HomeSIPIntents
        embed: true
      - target: HomeSIPWidgets
        embed: true

  HomeSIPIntents:
    type: app-extension
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: HomeSIPIntents
    info:
      path: HomeSIPIntents/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.intents-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).IntentHandler
          NSExtensionAttributes:
            IntentsSupported:
              - INStartCallIntent
    entitlements:
      path: HomeSIPIntents/HomeSIPIntents.entitlements
      properties:
        com.apple.developer.siri: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: work.manuzzi.homesip.intents
        PRODUCT_NAME: HomeSIPIntents
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: WQZGRLXS8K
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        SKIP_INSTALL: true

  HomeSIPWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: HomeSIPWidgets
      - path: HomeSIP/SIP/SharedStatus.swift
      - path: HomeSIP/SIP/ServerReachabilityProbe.swift
    info:
      path: HomeSIPWidgets/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: HomeSIPWidgets/HomeSIPWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.work.manuzzi.homesip
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: work.manuzzi.homesip.widgets
        PRODUCT_NAME: HomeSIPWidgets
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: WQZGRLXS8K
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        SKIP_INSTALL: true
